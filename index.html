<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="APEX"/>
  <title>APEX</title>
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%23667eea'/%3E%3Cstop offset='1' stop-color='%2306b6d4'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='180' height='180' rx='40' fill='%230a0a1a'/%3E%3Crect width='180' height='180' rx='40' fill='url(%23g)' opacity='0.15'/%3E%3Ctext x='90' y='95' font-family='Arial Black' font-size='80' font-weight='900' fill='url(%23g)' text-anchor='middle' dominant-baseline='middle'%3EA%3C/text%3E%3Ctext x='90' y='148' font-family='Arial' font-size='16' font-weight='700' fill='%2306b6d4' text-anchor='middle' letter-spacing='5'%3EAPEX%3C/text%3E%3C/svg%3E"/>
  <link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700&family=Satoshi:wght@400;500;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Syne:wght@700;800;900&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }

    :root {
      --bg1: #05050f;
      --bg2: #0a0a1f;
      --glass: rgba(255,255,255,0.05);
      --glass2: rgba(255,255,255,0.08);
      --glassBorder: rgba(255,255,255,0.12);
      --text: #F0F0FF;
      --text2: #A0A0C0;
      --dim: #505070;
      --cyan: #06B6D4;
      --cyan2: #22D3EE;
      --violet: #8B5CF6;
      --violet2: #A78BFA;
      --green: #10B981;
      --green2: #34D399;
      --red: #EF4444;
      --orange: #F97316;
      --line: rgba(255,255,255,0.08);
    }

    html, body {
      min-height: 100%;
      background: var(--bg1);
      font-family: 'Manrope', sans-serif;
      color: var(--text);
      overscroll-behavior: none;
    }

    /* Mesh gradient background */
    .mesh-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse at 20% 20%, rgba(139,92,246,0.18) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 10%, rgba(6,182,212,0.14) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 80%, rgba(16,185,129,0.10) 0%, transparent 50%),
        #05050f;
      pointer-events: none;
    }

    .app {
      position: relative;
      z-index: 1;
      min-height: 100dvh;
      padding-bottom: 88px;
    }

    /* Glass card */
    .glass-card {
      background: var(--glass);
      border: 1px solid var(--glassBorder);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 20px;
    }

    /* Neon text glow */
    .glow-cyan { text-shadow: 0 0 20px rgba(6,182,212,0.6); }
    .glow-violet { text-shadow: 0 0 20px rgba(139,92,246,0.6); }

    /* Progress bar */
    .bar-track {
      height: 8px;
      background: rgba(255,255,255,0.08);
      border-radius: 999px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 999px;
      transition: width 0.6s cubic-bezier(.4,2,.6,1);
    }

    /* Tap */
    .tap { transition: transform 0.12s cubic-bezier(.4,2,.55,1), opacity 0.12s; }
    .tap:active { transform: scale(0.95); opacity: 0.8; }

    /* Quick pill */
    .qpill {
      flex: 1;
      padding: 10px 2px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      color: var(--text2);
      font-family: 'Manrope', sans-serif;
      font-weight: 700;
      font-size: 13px;
      transition: all 0.12s;
      touch-action: manipulation;
      user-select: none;
      cursor: pointer;
    }
    .qpill:active {
      background: rgba(255,255,255,0.12);
      color: var(--text);
      transform: scale(0.95);
    }

    /* Mode toggle */
    .mode-wrap {
      display: flex;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 3px;
      gap: 3px;
    }
    .mode-btn {
      flex: 1; padding: 9px; border-radius: 12px;
      border: none; background: transparent;
      color: var(--dim); font-family: 'Manrope', sans-serif;
      font-weight: 700; font-size: 13px;
      transition: all 0.18s; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    /* Tab bar */
    .tabbar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(5,5,15,0.9);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border-top: 1px solid var(--line);
      display: flex;
      padding-bottom: env(safe-area-inset-bottom);
      z-index: 50;
    }
    .tab-btn {
      flex: 1; padding: 12px 0 10px;
      background: transparent; border: none;
      display: flex; flex-direction: column;
      align-items: center; gap: 3px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    /* Input */
    .custom-input {
      flex: 1;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      color: var(--text);
      padding: 13px 15px;
      font-family: 'Manrope', sans-serif;
      font-size: 15px;
      outline: none;
      -webkit-appearance: none;
      transition: border-color 0.2s, background 0.2s;
    }
    .custom-input::placeholder { color: var(--dim); }
    .custom-input:focus { background: rgba(255,255,255,0.08); }

    /* Calendar grid */
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7,1fr);
      gap: 5px 3px;
    }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(16px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .fade-up { animation: fadeUp 0.4s cubic-bezier(.4,0,.2,1) both; }

    @keyframes slideUp {
      from { transform:translateY(100%); opacity:0; }
      to   { transform:translateY(0); opacity:1; }
    }
    .slide-up { animation: slideUp 0.3s cubic-bezier(.4,0,.2,1); }

    /* Separator */
    .sep { height:1px; background: var(--line); }
  </style>
</head>
<body>
<div class="mesh-bg"></div>
<div id="app"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
const { useState, useEffect, useRef, createElement: h } = React;

const CAL_QUICK = [10, 50, 100, 500];
const PRO_QUICK = [10, 50, 100, 500];
const DEFAULT_GOALS = { cal: 2000, pro: 150 };
const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const DAYS = ["Su","Mo","Tu","We","Th","Fr","Sa"];

function getTodayET() {
  return new Date(new Date().getTime()-4*60*60*1000).toISOString().slice(0,10);
}
function load() {
  try { return JSON.parse(localStorage.getItem('apexhealth_v1')||'null'); }
  catch { return null; }
}
function save(s) { localStorage.setItem('apexhealth_v1', JSON.stringify(s)); }

// ── Arc SVG ring ──────────────────────────────────────────────────────────────
function Ring({ value, goal, color, size }) {
  size = size || 112;
  const pct = Math.min(value/goal, 1);
  const r = (size-16)/2;
  const circ = 2*Math.PI*r;
  const dash = pct * circ;
  return h('svg', { width:size, height:size, style:{ transform:'rotate(-90deg)', display:'block', flexShrink:0 } },
    h('circle', { cx:size/2, cy:size/2, r, fill:'none', stroke:'rgba(255,255,255,0.07)', strokeWidth:10 }),
    h('circle', { cx:size/2, cy:size/2, r, fill:'none', stroke:color, strokeWidth:10,
      strokeDasharray:`${dash} ${circ}`, strokeLinecap:'round',
      style:{ transition:'stroke-dasharray 0.6s cubic-bezier(.4,2,.55,1)', filter:`drop-shadow(0 0 6px ${color}80)` } })
  );
}

// ── Tracker Card ──────────────────────────────────────────────────────────────
function TrackerCard({ label, icon, color, color2, value, goal, quick, onAdd, onSetGoal, delay }) {
  const [input, setInput] = useState('');
  const [gInput, setGInput] = useState(String(goal));
  const [editGoal, setEditGoal] = useState(false);
  const [mode, setMode] = useState('add');
  const pct = Math.min(Math.round((value/goal)*100), 100);
  const left = Math.max(goal-value, 0);
  const done = value >= goal;
  const sub = mode === 'sub';
  const ac = sub ? '#EF4444' : color;

  const act = (amt) => {
    const n = parseFloat(amt);
    if (!isNaN(n) && n > 0) onAdd(sub ? -Math.round(n) : Math.round(n));
    setInput('');
  };
  const saveGoal = () => {
    const n = parseFloat(gInput);
    if (!isNaN(n) && n > 0) onSetGoal(Math.round(n));
    setEditGoal(false);
  };

  return h('div', { className:'glass-card fade-up', style:{ marginBottom:12, animationDelay:`${delay}ms`, overflow:'hidden' } },

    // Top section: ring + numbers
    h('div', { style:{ padding:'18px 18px 14px', display:'flex', alignItems:'center', gap:16 } },
      // Ring
      h('div', { style:{ position:'relative', flexShrink:0, width:112, height:112 } },
        h(Ring, { value, goal, color: sub?'#EF4444':color, size:112 }),
        h('div', { style:{ position:'absolute', inset:0, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center' } },
          h('div', { style:{ fontSize:26, fontWeight:800, color: sub?'#EF4444':color, lineHeight:1, fontFamily:"'Syne',sans-serif", filter:`drop-shadow(0 0 8px ${sub?'#EF4444':color}80)` } }, pct+'%'),
          h('div', { style:{ fontSize:9, color:'rgba(255,255,255,0.3)', letterSpacing:2, textTransform:'uppercase', fontWeight:600, marginTop:3 } }, 'DONE')
        )
      ),
      // Stats
      h('div', { style:{ flex:1, display:'flex', flexDirection:'column', gap:0 } },
        h('div', { style:{ display:'flex', alignItems:'center', gap:8, marginBottom:10 } },
          h('span', { style:{ fontSize:20 } }, icon),
          h('span', { style:{ fontFamily:"'Syne',sans-serif", fontWeight:800, fontSize:18, color:'rgba(255,255,255,0.95)', letterSpacing:-0.3 } }, label),
          done && !sub && h('span', { style:{ fontSize:11, fontWeight:700, color, background:`${color}20`, border:`1px solid ${color}40`, borderRadius:7, padding:'2px 8px', letterSpacing:0.5 } }, '✓ DONE')
        ),
        // Big value
        h('div', { style:{ fontFamily:"'Syne',sans-serif", fontSize:42, fontWeight:900, color: sub?'#EF4444':color, lineHeight:1, letterSpacing:-1, filter:`drop-shadow(0 0 12px ${sub?'#EF4444':color}60)` } }, value),
        h('div', { style:{ display:'flex', justifyContent:'space-between', alignItems:'center', marginTop:6 } },
          editGoal
            ? h('div', { style:{ display:'flex', gap:5, alignItems:'center' } },
                h('input', { value:gInput, onChange:e=>setGInput(e.target.value), onKeyDown:e=>e.key==='Enter'&&saveGoal(), inputMode:'numeric', autoFocus:true,
                  style:{ width:64, background:'rgba(255,255,255,0.1)', border:`1px solid ${color}60`, borderRadius:8, color:'#fff', padding:'4px 8px', fontSize:12, outline:'none', fontFamily:"'Manrope',sans-serif" } }),
                h('button', { onClick:saveGoal, style:{ background:color, border:'none', borderRadius:8, color:'#000', padding:'4px 10px', fontWeight:800, fontSize:12, cursor:'pointer' } }, '✓')
              )
            : h('button', { onClick:()=>{ setGInput(String(goal)); setEditGoal(true); }, style:{ background:'rgba(255,255,255,0.06)', border:'1px solid rgba(255,255,255,0.1)', borderRadius:8, color:'rgba(255,255,255,0.4)', padding:'4px 10px', fontSize:11, cursor:'pointer', fontWeight:600 } }, '/ '+goal),
          h('span', { style:{ fontSize:12, color:'rgba(255,255,255,0.35)', fontWeight:600 } }, left===0?'✓ All done':left+' left')
        )
      )
    ),

    // Progress bar
    h('div', { style:{ padding:'0 18px 14px' } },
      h('div', { className:'bar-track' },
        h('div', { className:'bar-fill', style:{ width:`${pct}%`, background:`linear-gradient(90deg, ${color}, ${color2})`, boxShadow:`0 0 10px ${color}60` } })
      )
    ),

    h('div', { className:'sep' }),

    // Add / Remove toggle
    h('div', { style:{ padding:'10px 14px 8px' } },
      h('div', { className:'mode-wrap' },
        ...['add','sub'].map(m =>
          h('button', { key:m, className:'mode-btn tap', onClick:()=>setMode(m), style:{
            background: mode===m ? (m==='sub'?'#EF4444':color) : 'transparent',
            color: mode===m ? (m==='sub'?'#fff':'#000') : 'rgba(255,255,255,0.35)',
            boxShadow: mode===m ? `0 2px 14px ${m==='sub'?'#EF444460':color+'60'}` : 'none',
          } }, m==='add'?'＋ Add':'－ Remove')
        )
      )
    ),

    // Quick pills
    h('div', { style:{ display:'flex', gap:6, padding:'0 14px 10px' } },
      ...quick.map(amt => h('button', { key:amt, className:'qpill tap', onClick:()=>act(amt),
        style:{ color: sub?'#EF4444':'rgba(255,255,255,0.5)' }
      }, (sub?'−':'+')+amt))
    ),

    h('div', { className:'sep' }),

    // Custom input row
    h('div', { style:{ display:'flex', gap:0 } },
      h('input', {
        type:'number', inputMode:'numeric', className:'custom-input',
        placeholder: sub?'remove amount...':'custom amount...',
        value:input, onChange:e=>setInput(e.target.value),
        onKeyDown:e=>e.key==='Enter'&&act(input),
        onFocus:e=>e.target.style.borderColor=ac,
        onBlur:e=>e.target.style.borderColor='rgba(255,255,255,0.1)',
        style:{ flex:1, background:'transparent', border:'none', borderRadius:0, borderBottomLeftRadius:19, padding:'14px 16px', fontSize:15, color:'#fff', outline:'none', fontFamily:"'Manrope',sans-serif" }
      }),
      h('button', { className:'tap', onClick:()=>act(input), style:{
        background: sub?'#EF4444':`linear-gradient(135deg,${color},${color2})`,
        border:'none', borderBottomRightRadius:19,
        color:'#000', padding:'14px 22px',
        fontWeight:900, fontSize:22, cursor:'pointer',
        boxShadow:`0 -2px 20px ${sub?'#EF444450':color+'50'}`,
        minWidth:58, fontFamily:"'Syne',sans-serif",
      } }, sub?'−':'+')
    )
  );
}

// ── Calendar ──────────────────────────────────────────────────────────────────
function CalPage({ history }) {
  const today = getTodayET();
  const td = new Date(today+'T12:00:00');
  const [yr, setYr] = useState(td.getFullYear());
  const [mo, setMo] = useState(td.getMonth());

  const firstDay = new Date(yr, mo, 1).getDay();
  const dim = new Date(yr, mo+1, 0).getDate();
  const cells = [];
  for (let i=0;i<firstDay;i++) cells.push(null);
  for (let d=1;d<=dim;d++) cells.push(d);

  const mk = `${yr}-${String(mo+1).padStart(2,'0')}`;
  let hit=0, tracked=0;
  for (let d=1;d<=dim;d++) {
    const k=`${mk}-${String(d).padStart(2,'0')}`;
    const e=history[k];
    if (k<=today&&e) { tracked++; if(e.calHit&&e.proHit) hit++; }
  }
  const score = tracked>0 ? Math.round((hit/tracked)*100) : null;

  const getStatus = d => {
    const k=`${mk}-${String(d).padStart(2,'0')}`;
    if (k>today) return 'future';
    const e=history[k];
    if (!e) return 'miss';
    if (e.calHit&&e.proHit) return 'full';
    if (e.calHit||e.proHit) return 'half';
    return 'miss';
  };

  const cs = (status, isToday) => {
    if (isToday) return { bg:'rgba(255,255,255,0.95)', col:'#05050f', fw:900, border:'none', glow:'none' };
    switch(status) {
      case 'full': return { bg:'rgba(16,185,129,0.18)', col:'#10B981', fw:700, border:'1px solid rgba(16,185,129,0.4)', glow:'0 0 8px rgba(16,185,129,0.3)' };
      case 'half': return { bg:'rgba(139,92,246,0.15)', col:'#8B5CF6', fw:700, border:'1px solid rgba(139,92,246,0.35)', glow:'none' };
      case 'miss': return { bg:'rgba(239,68,68,0.08)', col:'rgba(239,68,68,0.6)', fw:500, border:'1px solid rgba(239,68,68,0.2)', glow:'none' };
      default:     return { bg:'transparent', col:'rgba(255,255,255,0.2)', fw:400, border:'none', glow:'none' };
    }
  };

  const navBtn = (lbl, fn) => h('button', { className:'tap', onClick:fn, style:{
    background:'rgba(255,255,255,0.06)', border:'1px solid rgba(255,255,255,0.1)',
    borderRadius:12, color:'rgba(255,255,255,0.6)', width:40, height:40, fontSize:20,
    display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer',
  } }, lbl);

  return h('div', { style:{ padding:'0 14px 20px' } },
    // Nav
    h('div', { style:{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:16 } },
      navBtn('‹', ()=>mo===0?(setMo(11),setYr(y=>y-1)):setMo(m=>m-1)),
      h('div', { style:{ textAlign:'center' } },
        h('div', { style:{ fontFamily:"'Syne',sans-serif", fontWeight:800, fontSize:20, color:'#fff', letterSpacing:-0.3 } }, MONTHS[mo]),
        h('div', { style:{ fontSize:11, color:'rgba(255,255,255,0.3)', fontWeight:600 } }, yr)
      ),
      navBtn('›', ()=>mo===11?(setMo(0),setYr(y=>y+1)):setMo(m=>m+1))
    ),

    // Score card
    h('div', { className:'glass-card fade-up', style:{ padding:'18px', marginBottom:14, display:'flex', alignItems:'center', justifyContent:'space-between' } },
      h('div', null,
        h('div', { style:{ fontSize:10, color:'rgba(255,255,255,0.3)', letterSpacing:2, textTransform:'uppercase', fontWeight:700, marginBottom:4 } }, 'CONSISTENCY SCORE'),
        h('div', { style:{ fontFamily:"'Syne',sans-serif", fontWeight:900, fontSize:46, color: score!==null?'#10B981':'rgba(255,255,255,0.2)', lineHeight:1, letterSpacing:-1, filter:score!==null?'drop-shadow(0 0 12px rgba(16,185,129,0.5))':'none' } }, score!==null?score+'%':'—'),
        h('div', { style:{ fontSize:12, color:'rgba(255,255,255,0.35)', marginTop:6, fontWeight:500 } }, `${hit} of ${tracked} days · both targets`)
      ),
      h('div', { style:{ fontSize:44 } }, score===null?'📅':score>=80?'🔥':score>=50?'💪':'📈')
    ),

    // Legend
    h('div', { style:{ display:'flex', gap:14, marginBottom:12 } },
      ...[['#10B981','Both'],['#8B5CF6','One'],['#EF4444','Missed']].map(([c,l])=>
        h('div',{key:l,style:{display:'flex',alignItems:'center',gap:6}},
          h('div',{style:{width:8,height:8,borderRadius:'50%',background:c,boxShadow:`0 0 6px ${c}`}}),
          h('span',{style:{fontSize:11,color:'rgba(255,255,255,0.4)',fontWeight:600}},l)
        )
      )
    ),

    // Days
    h('div', { style:{ display:'grid', gridTemplateColumns:'repeat(7,1fr)', marginBottom:7 } },
      ...DAYS.map(d=>h('div',{key:d,style:{textAlign:'center',fontSize:11,color:'rgba(255,255,255,0.25)',fontWeight:700,letterSpacing:0.5}},d))
    ),

    // Grid
    h('div', { className:'cal-grid' },
      ...cells.map((d,i)=>{
        if (!d) return h('div',{key:'e'+i});
        const k=`${mk}-${String(d).padStart(2,'0')}`;
        const s=cs(getStatus(d),k===today);
        return h('div',{key:d,style:{display:'flex',justifyContent:'center'}},
          h('div',{style:{width:36,height:36,borderRadius:11,background:s.bg,border:s.border,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:"'Manrope',sans-serif",fontWeight:s.fw,fontSize:12,color:s.col,boxShadow:s.glow}},d)
        );
      })
    )
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const [page, setPage] = useState('tracker');
  const [cal, setCal] = useState(0);
  const [pro, setPro] = useState(0);
  const [goals, setGoals] = useState(DEFAULT_GOALS);
  const [date, setDate] = useState(getTodayET());
  const [history, setHistory] = useState({});
  const [resetModal, setResetModal] = useState(false);
  const timer = useRef(null);

  const pushHistory = (cv,pv,gv,dt,hist) => {
    const u={...hist,[dt]:{calHit:cv>=gv.cal,proHit:pv>=gv.pro,cal:cv,pro:pv}};
    setHistory(u); return u;
  };

  useEffect(()=>{
    const s=load(), today=getTodayET();
    if (s) {
      const hist=s.history||{};
      if (s.date!==today) {
        if (s.date) hist[s.date]={calHit:(s.cal||0)>=(s.goals?.cal||2000),proHit:(s.pro||0)>=(s.goals?.pro||150),cal:s.cal||0,pro:s.pro||0};
        setCal(0);setPro(0);setDate(today);setHistory(hist);setGoals(s.goals||DEFAULT_GOALS);
      } else {
        setCal(s.cal??0);setPro(s.pro??0);
        setDate(s.date??today);setHistory(hist);setGoals(s.goals||DEFAULT_GOALS);
      }
    }
  },[]);

  useEffect(()=>{
    const hist=pushHistory(cal,pro,goals,date,history);
    save({cal,pro,goals,date,history:hist});
  },[cal,pro,goals,date]);

  useEffect(()=>{
    function sched(){
      const now=new Date(),next=new Date(now);
      next.setUTCHours(4,0,0,0);
      if(next<=now)next.setUTCDate(next.getUTCDate()+1);
      timer.current=setTimeout(()=>{const t=getTodayET();setCal(0);setPro(0);setDate(t);sched();},next-now);
    }
    sched(); return()=>clearTimeout(timer.current);
  },[]);

  const doReset=()=>{setCal(0);setPro(0);setDate(getTodayET());setResetModal(false);};
  const calPct = Math.min(Math.round((cal/goals.cal)*100),100);
  const proPct = Math.min(Math.round((pro/goals.pro)*100),100);

  return h('div', { className:'app' },

    // ── Header ──────────────────────────────────────────────────────────────
    h('div', { style:{ padding:'56px 18px 16px', borderBottom:'1px solid rgba(255,255,255,0.07)' } },
      h('div', { style:{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom: page==='tracker'?14:0 } },
        // Logo
        h('div', { style:{ display:'flex', alignItems:'center', gap:10 } },
          h('div', { style:{
            width:38, height:38, borderRadius:12,
            background:'linear-gradient(135deg,#8B5CF6,#06B6D4)',
            display:'flex', alignItems:'center', justifyContent:'center',
            fontSize:20, boxShadow:'0 4px 20px rgba(139,92,246,0.5)',
          } }, '⚡'),
          h('div', null,
            h('div', { style:{ fontFamily:"'Syne',sans-serif", fontWeight:900, fontSize:20, color:'#fff', letterSpacing:1, lineHeight:1 } }, 'APEX'),
            h('div', { style:{ fontSize:10, color:'rgba(255,255,255,0.3)', fontWeight:600, letterSpacing:2 } }, 'TRACK · OPTIMIZE · WIN')
          )
        ),
        // Controls
        h('div', { style:{ display:'flex', gap:8 } },
          page==='tracker' && h('button', { className:'tap', onClick:()=>setResetModal(true), style:{ background:'rgba(239,68,68,0.12)', border:'1px solid rgba(239,68,68,0.3)', borderRadius:10, color:'#EF4444', padding:'7px 13px', fontWeight:700, fontSize:12, letterSpacing:0.5 } }, 'RESET')
        )
      ),

      // Summary bars (tracker only)
      page==='tracker' && h('div', { style:{ display:'flex', gap:14 } },
        ...[
          { label:'CALORIES', val:cal, goal:goals.cal, pct:calPct, c1:'#F97316', c2:'#FBBF24' },
          { label:'PROTEIN', val:pro, goal:goals.pro, pct:proPct, c1:'#06B6D4', c2:'#8B5CF6' },
        ].map(({label,val,goal,pct,c1,c2})=>
          h('div', { key:label, style:{ flex:1 } },
            h('div', { style:{ display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom:5 } },
              h('span', { style:{ fontSize:9, color:'rgba(255,255,255,0.35)', fontWeight:700, letterSpacing:1.5 } }, label),
              h('span', { style:{ fontFamily:"'Syne',sans-serif", fontSize:14, fontWeight:800, color:c1, filter:`drop-shadow(0 0 6px ${c1}80)` } }, val+'/'+goal)
            ),
            h('div', { className:'bar-track', style:{ height:5 } },
              h('div', { className:'bar-fill', style:{ width:`${pct}%`, background:`linear-gradient(90deg,${c1},${c2})`, boxShadow:`0 0 8px ${c1}60` } })
            )
          )
        )
      )
    ),

    // ── Content ──────────────────────────────────────────────────────────────
    page==='tracker'
      ? h('div', { style:{ padding:'14px 14px 0' } },
          h(TrackerCard, { label:'Calories', icon:'🔥', color:'#F97316', color2:'#FBBF24', value:cal, goal:goals.cal, quick:CAL_QUICK, onAdd:n=>setCal(c=>Math.max(0,c+n)), onSetGoal:n=>setGoals(g=>({...g,cal:n})), delay:0 }),
          h(TrackerCard, { label:'Protein',  icon:'💪', color:'#06B6D4', color2:'#8B5CF6', value:pro, goal:goals.pro, quick:PRO_QUICK, onAdd:n=>setPro(p=>Math.max(0,p+n)), onSetGoal:n=>setGoals(g=>({...g,pro:n})), delay:80 })
        )
      : h('div', { style:{ paddingTop:16 } }, h(CalPage, { history })),

    // ── Tab bar ───────────────────────────────────────────────────────────────
    h('div', { className:'tabbar' },
      ...[
        { id:'tracker', icon:'⚡', lbl:'TODAY', c:'#F97316' },
        { id:'calendar', icon:'📅', lbl:'HISTORY', c:'#06B6D4' },
      ].map(({id,icon,lbl,c})=>
        h('button', { key:id, className:'tab-btn tap', onClick:()=>setPage(id) },
          h('span', { style:{ fontSize:22, opacity:page===id?1:0.2, filter:page===id?`drop-shadow(0 0 8px ${c})`:'none' } }, icon),
          h('span', { style:{ fontFamily:"'Syne',sans-serif", fontSize:11, fontWeight:800, color:page===id?c:'rgba(255,255,255,0.25)', letterSpacing:1, transition:'color 0.2s' } }, lbl),
          page===id && h('div', { style:{ width:20, height:3, borderRadius:999, background:c, marginTop:2, boxShadow:`0 0 10px ${c}` } })
        )
      )
    ),

    // ── Reset modal ───────────────────────────────────────────────────────────
    resetModal && h('div', { onClick:()=>setResetModal(false), style:{ position:'fixed', inset:0, background:'rgba(0,0,0,0.7)', backdropFilter:'blur(16px)', WebkitBackdropFilter:'blur(16px)', display:'flex', alignItems:'flex-end', justifyContent:'center', zIndex:100, padding:'0 14px 44px' } },
      h('div', { className:'glass-card slide-up', onClick:e=>e.stopPropagation(), style:{ padding:'28px 20px', width:'100%', maxWidth:420, display:'flex', flexDirection:'column', gap:12 } },
        h('div', { style:{ textAlign:'center', marginBottom:6 } },
          h('div', { style:{ fontSize:40, marginBottom:10 } }, '🗑️'),
          h('div', { style:{ fontFamily:"'Syne',sans-serif", fontWeight:900, fontSize:22, color:'#fff', letterSpacing:0.5 } }, 'RESET TODAY?'),
          h('div', { style:{ fontSize:13, color:'rgba(255,255,255,0.4)', marginTop:6, lineHeight:1.5 } }, 'Clears calories & protein. Goals & history stay.')
        ),
        h('button', { className:'tap', onClick:doReset, style:{ background:'linear-gradient(135deg,#EF4444,#F97316)', border:'none', borderRadius:16, color:'#fff', padding:'16px', fontFamily:"'Syne',sans-serif", fontWeight:900, fontSize:15, cursor:'pointer', boxShadow:'0 4px 20px rgba(239,68,68,0.5)', letterSpacing:0.5 } }, 'YES, RESET'),
        h('button', { className:'tap', onClick:()=>setResetModal(false), style:{ background:'rgba(255,255,255,0.06)', border:'1px solid rgba(255,255,255,0.1)', borderRadius:16, color:'rgba(255,255,255,0.4)', padding:'14px', fontFamily:"'Manrope',sans-serif", fontWeight:700, fontSize:14, cursor:'pointer' } }, 'Cancel')
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(h(App));
</script>
</body>
</html>
